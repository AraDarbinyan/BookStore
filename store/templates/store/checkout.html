{% extends 'store/base.html' %}
{% load static %}

{% block title %}Checkout{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'store/css/checkout.css' %}">
{% endblock %}

{% block content %}
<div class="checkout-page">
    <div class="checkout-box">
        <h2>Checkout</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="address">Address:</label>
                <textarea name="address" id="address" rows="4">{{ customer.address }}</textarea>
            </div>

            <div class="form-group">
                <label>Payment Method:</label>

                <div class="payment-options">
                    {% for value, label in payment_methods %}
                        <div class="payment-option">
                            <input type="radio" id="payment_{{ forloop.counter }}" name="payment_method" value="{{ value }}" required>
                            <label for="payment_{{ forloop.counter }}">{{ label }}</label>
                        </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="checkout-btn">Confirm Order</button>
        </form>
    </div>
</div>
{% endblock %}
